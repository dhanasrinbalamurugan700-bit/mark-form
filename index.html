<!DOCTYPE html>
<html>
<head>
    <title>Colorful Student Marks</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        h1 {
            color: #0b0101;
            margin-bottom: 25px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        table {
            width: 85%;
            margin: auto;
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        th {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 12px;
            font-size: 16px;
        }

        td {
            padding: 10px;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background-color: #f2f6ff;
        }

        tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tr:hover {
            background-color: #ffe0f7;
            transform: scale(1.01);
            transition: 0.3s;
        }

        .pass {
            color: #28a745;
            font-weight: bold;
        }

        .fail {
            color: #dc3545;
            font-weight: bold;
        }

        .topper {
            background-color: #edcb87 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎓 Student Marks Report</h1>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Maths</th>
            <th>Science</th>
            <th>English</th>
            <th>Total</th>
            <th>Result</th>
        </tr>

        <tr class="topper">
            <td>101</td>
            <td>Surya</td>
            <td>95</td>
            <td>92</td>
            <td>96</td>
            <td>283</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Sri</td>
            <td>85</td>
            <td>78</td>
            <td>88</td>
            <td>251</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Aadhav</td>
            <td>70</td>
            <td>65</td>
            <td>79</td>
            <td>214</td>
            <td class="pass">Pass</td>
        </tr>

        <tr>
            <td>104</td>
            <td>Sushmitha</td>
            <td>40</td>
            <td>35</td>
            <td>50</td>
            <td>125</td>
            <td class="fail">Fail</td>
        </tr>

    </table>

</body>
</html>
